name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          cd playtree
          yes | buildozer android debug
        env:
          DISPLAY: ':99'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PLAYTREE.apk
          path: playtree/bin/*.apk
          retention-days: 30

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pyinstaller pygame-ce

      - name: Build Windows EXE
        run: |
          cd playtree
          python -m PyInstaller --name PLAYTREE --onefile --windowed --add-data "src;src" --hidden-import pygame main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PLAYTREE.exe
          path: playtree/dist/PLAYTREE.exe
          retention-days: 30

  release:
    needs: [build, build-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PLAYTREE.apk/*.apk
            PLAYTREE.exe/PLAYTREE.exe
          generate_release_notes: true
